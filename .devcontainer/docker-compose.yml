services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
  database:
    image: postgres
    environment:
      POSTGRES_USER: trax
      POSTGRES_PASSWORD: trax123
      POSTGRES_DB: trax
      POSTGRES_MULTIPLE_DATABASES: trax_scheduler_tests,trax_data_tests
    ports:
      - "5432:5432"
    volumes:
      - ../init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
